    <main>
        <h1>Fale conosco</h1>
        <p>Envie uma mensagem para o IFTM</p>
        <section id="formulario">
            <form action="cadastro.php" method="post" autocomplete="on">
                <fieldset>
                    <legend>Dados pessoais</legend>

                    <p>
                        <label for="inome">Nome</label>
                        <input type="text" name="nome" id="inome" minlength="5" maxlength="40" required>
                    </p>

                    <p>
                        <label for="iemail">E-mail</label>
                        <input type="email" name="email" id="iemail" autocomplete="email" required placeholder="Informe o e-mail para contato">
                    </p>

                    <p>
                        <label for="itel">Telefone</label>
                        <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required placeholder="(xx)xxxxx-xxxx">
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Mensagem</legend>

                    <p>
                        <label for="itopico">Tópico:</label>
                        <select name="topico" id="itopico" required>

                            <option value="" selected>--- Selecione o tópico ---</option>
                            <option value="assistencia">Assistência Estudantil</option>
                            <option value="certificacao">Certificação ENEM/ENCCEJA</option>
                            <option value="concurso">Concurso Público</option>
                            <option value="matricula">Matricula</option>
                            <option value="processo">Processo seletivo (Cursos Técnicos, Graduação e Pós-graduação)</option>
                            <option value="qualidade">Qualidade da água</option>
                            <option value="site">Site</option>
                            <option value="outros">Outros tópicos</option>

                        </select>
                    </p>

                    <p>
                        <label for="imensagem">Mensagem</label>
                        <textarea name="mensagem" id="imensagem" required placeholder="Digite aqui sua mensagem"></textarea>
                    </p>
                </fieldset>

                <div class="area-botao">
                    <input type="submit" value="Enviar mensagem" class="botao-principal">
                </div>
            </form>
        </section>
    </main>

    <footer>
