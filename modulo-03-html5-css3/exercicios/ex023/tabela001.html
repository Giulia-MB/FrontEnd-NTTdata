<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse; /* collapse (junto), pode ser separate (separar bordas), inherit (herda do elemento pai)*/
        }

        td {
            padding: 8px;
            border: 1px solid black;
            text-align: center; /*alinhamento horizontal*/
            vertical-align: middle; /*top, midle, bottom*/
        }

        .numero {
            text-align: right;
        }

    </style>
</head>
<body>
    <!-- Hierarquia de tabelas (simples)
     TABLE = tabela
        TABLE ROW = linha de tabela
            TABLE HEADER = cabeçalho da tabela
            TABLE DATA = dado de tabela
     -->
    <h1>Minha primeira tabela</h1>
    <table>
        <tr><!-- Primeira linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr><!-- Segunda linha-->
            <td>A2</td>
            <td>B2</td>
            <td class="numero">C2</td>
        </tr>
        <tr><!-- Terceira linha-->
            <td>A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>
        <tr><!-- Quarta linha-->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
